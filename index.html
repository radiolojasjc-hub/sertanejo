        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .now-playing { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 15; width: 90%; max-width: 400px; user-select: none; -webkit-user-select: none; }

        .now-playing .music-artist { color: #eee; font-size: 1.0rem; font-weight: 300; text-shadow: 0 0 30px rgba(0,0,0,0.9); margin-bottom: 8px; }

        .equalizer span { width: 4px; background: linear-gradient(180deg, var(--cor), var(--cor)); border-radius: 3px; animation: equalize 0.6s infinite alternate ease-in-out; }

        .equalizer span:nth-child(3) { animation-delay: 0.2s; height: 14px; }
        .equalizer span:nth-child(4) { animation-delay: 0.3s; height: 28px; }
        .equalizer span:nth-child(5) { animation-delay: 0.4s; height: 18px; }
        .equalizer span:nth-child(6) { animation-delay: 0.5s; height: 26px; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .fav-modal.open { display: flex; opacity: 1; transform: translate(-50%, -50%) scale(1); border-image: linear-gradient(135deg, var(--cor), var(--cor)) 1; }

<body>

    <script>
        (function() {
            'use strict';

            // ============================================================
            // CONFIGURAÇÕES - SERTANEJO
            // ============================================================
            const GENERO = 'SERTANEJO';
            const COR = '#ff8800';
            const JSON_URL = 'sertanejo.json';
            const BASE_URL = 'https://raw.githubusercontent.com/radiolojasjc-hub/sertanejo/refs/heads/main/';

            let musicas = [];

            let isPlaying = false;
            let shuffleMode = false;
            let isBackgroundActive = false;
            let timerInterval = null;
            let historicoReproducao = [];
            let favorites = [];
            let fabOpen = false;
            let sleepTimer = null;
            let hideControlsTimeout = null;
            let ultimoId = null;
            let carregandoMusica = false;

            const audio = document.getElementById('musicPlayer');
            const playBtn = document.getElementById('playBtn');
            const progressFill = document.getElementById('progressFill');
            const currentTimeEl = document.getElementById('currentTime');
            const totalTimeEl = document.getElementById('totalTime');
            const genreBadge = document.getElementById('genreBadge');
            const scrollText = document.getElementById('scrollText');
            const splash = document.getElementById('splash');
            const tapToStart = document.getElementById('tap-to-start');
            const appContainer = document.getElementById('appContainer');
            const menuButton = document.getElementById('menuButton');
            const notification = document.getElementById('notification');
            const audioStatus = document.getElementById('audioStatus');
            const bottomControls = document.getElementById('bottomControls');
            const shuffleBtn = document.getElementById('shuffleBtn');
            const bgVideo = document.getElementById('bgVideo');
            const heartBtn = document.getElementById('heartBtn');
            const nowTitle = document.getElementById('nowTitle');
            const nowArtist = document.getElementById('nowArtist');
            const favTopBtn = document.getElementById('favTopBtn');
            const favCount = document.getElementById('favCount');
            const searchInput = document.getElementById('searchInput');
            const clearSearchBtn = document.getElementById('clearSearchBtn');
            const equalizer = document.getElementById('equalizer');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const backgroundAudio = document.getElementById('backgroundAudio');
            const menuPopup = document.getElementById('menuPopup');

            function showNotification(msg, d = 1500) {
                notification.textContent = msg;
                notification.classList.add('show');

            }

            function gerarUrlCompleta(nome) {
                if (!nome || !nome.trim()) return '';
                if (nome.startsWith('http://') || nome.startsWith('https://')) return nome;
                let n = nome.replace(/^\.\//, '').replace(/^\/+/, '');
                n = n.replace(/[^a-zA-Z0-9\-_.]/g, '');
                if (!n) return '';
                return BASE_URL + n;
            }

            function gerarUrlsAlternativas(musica) {
                const urls = new Set();
                const src = musica.src || '';
                if (src && src.trim()) { const u = gerarUrlCompleta(src); if (u) urls.add(u); }
                
                const base = src.replace(/\.[^.]+$/, '');
                const exts = ['mp3', 'm4a'];
                const variacoes = [
                    base,
                    base.replace(/ /g, '_'),
                    base.replace(/ /g, '-'),
                    base.replace(/[^a-zA-Z0-9]/g, ''),
                    musica.title.replace(/[^a-zA-Z0-9 ]/g, '').trim().replace(/ /g, '_'),
                    musica.title.replace(/[^a-zA-Z0-9 ]/g, '').trim().replace(/ /g, '-'),
                    (musica.artist + '_' + musica.title).replace(/[^a-zA-Z0-9]/g, '_').replace(/_+/g, '_')
                ];
                
                const titleClean = musica.title.replace(/[^a-zA-Z0-9 ]/g, '').trim();
                if (titleClean && titleClean.length > 2) {
                    variacoes.push(titleClean);
                    variacoes.push(titleClean.replace(/ /g, '_'));
                    variacoes.push(titleClean.replace(/ /g, '-'));
                }
                
                const artist = musica.artist || '';
                const combo = (artist + ' ' + musica.title).replace(/[^a-zA-Z0-9 ]/g, '').trim();
                if (combo && combo.length > 3) {
                    variacoes.push(combo);
                    variacoes.push(combo.replace(/ /g, '_'));
                    variacoes.push(combo.replace(/ /g, '-'));
                }
                
                variacoes.forEach(n => {
                    if (n && n.trim().length > 0) {
                        exts.forEach(ext => {
                            const nl = n.trim().replace(/[^a-zA-Z0-9\-_]/g, '');
                            if (nl.length > 0) {
                                const url = gerarUrlCompleta(nl + '.' + ext);
                                if (url) urls.add(url);
                            }
                        });
                    }
                });
                
                if (src.endsWith('.m4a')) {
                    const mp3 = src.replace(/\.m4a$/, '.mp3');
                    const urlMp3 = gerarUrlCompleta(mp3);
                    if (urlMp3) urls.add(urlMp3);
                }
                if (src.endsWith('.mp3')) {
                    const m4a = src.replace(/\.mp3$/, '.m4a');
                    const urlM4a = gerarUrlCompleta(m4a);
                    if (urlM4a) urls.add(urlM4a);
                }
                
                return Array.from(urls);
            }

                        else if (data.data && Array.isArray(data.data)) data = data.data;

            function obterProximaMusica() {
                if (!currentPlaylist || currentPlaylist.length === 0) {
                    if (musicas.length === 0) return null;
                    currentPlaylist = shuffleArray([...musicas]);
                    if (ultimoId && currentPlaylist.length > 1) {
                        const idx = currentPlaylist.findIndex(m => m.id === ultimoId);
                        if (idx > -1) currentPlaylist.splice(idx, 1);
                    }
                    currentIndex = 0;
                }
                if (currentIndex >= currentPlaylist.length) {
                    const ultima = currentPlaylist[currentPlaylist.length - 1];
                    ultimoId = ultima ? ultima.id : null;
                    if (musicas.length === 0) return null;
                    currentPlaylist = shuffleArray([...musicas]);
                    if (ultimoId && currentPlaylist.length > 1) {
                        const idx = currentPlaylist.findIndex(m => m.id === ultimoId);
                        if (idx > -1) currentPlaylist.splice(idx, 1);
                    }
                    currentIndex = 0;
                }
                const musica = currentPlaylist[currentIndex];
                if (!musica) return null;
                currentIndex++;
                return musica;
            }

            async function playMusic() {
                if (carregandoMusica) return;
                if (!isBackgroundActive) { showNotification("⚠️ Ative o áudio!", 1000); return; }
                if (!musicas.length) { showNotification("Playlist vazia!", 1500); return; }
                if (!currentPlaylist || currentPlaylist.length === 0) { currentPlaylist = shuffleArray([...musicas]); currentIndex = 0; }

                carregandoMusica = true;
                const track = obterProximaMusica();
                if (!track) { showNotification("Nenhuma música disponível", 1000); carregandoMusica = false; return; }

                ultimoId = track.id;
                updateNowPlaying(track);
                adicionarAoHistorico(track);

                const urls = gerarUrlsAlternativas(track);
                if (urls.length === 0) { 
                    showNotification("❌ Sem URL", 1000); 
                    carregandoMusica = false; 
                    setTimeout(nextTrack, 500); 
                    return; 
                }

                console.log(`🎯 Tentando ${urls.length} URLs para: ${track.title}`);

                let indiceAtual = 0;
                let timeoutId = null;
                let sucesso = false;

                function tentarProximo() {
                    if (indiceAtual >= urls.length) {
                        if (!sucesso) {
                            showNotification("⏭️ Pulando...", 800);
                            carregandoMusica = false;
                            setTimeout(nextTrack, 300);
                        }
                        return;
                    }

                    const url = urls[indiceAtual];
                    if (indiceAtual > 0 && indiceAtual % 3 === 0) {
                        showNotification(`🔄 Tentando... (${indiceAtual}/${urls.length})`, 1500);
                    }

                    if (timeoutId) clearTimeout(timeoutId);

                    audio.pause();
                    audio.src = url;
                    audio.load();

                    timeoutId = setTimeout(() => {
                        if (!sucesso) {
                            console.warn(`⏰ Timeout para ${url}`);
                            indiceAtual++;
                            tentarProximo();
                        }
                    }, 4000);

                    audio.oncanplay = () => {
                        if (timeoutId) clearTimeout(timeoutId);
                        audio.play()
                            .then(() => {
                                sucesso = true;
                                isPlaying = true;
                                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                                equalizer.classList.remove('paused');
                                startTimer();
                                carregandoMusica = false;
                                showNotification(`✅ Tocando: ${track.title}`, 1000);
                                if (url !== track.src) {
                                    track.src = url;
                                    try { localStorage.setItem('src_cache_' + track.id, url); } catch(e) {}
                                }
                            })
                            .catch(() => {
                                indiceAtual++;
                                tentarProximo();
                            });
                    };

                    audio.onerror = () => {
                        if (timeoutId) clearTimeout(timeoutId);
                        indiceAtual++;
                        tentarProximo();
                    };
                }

                tentarProximo();
            }

            let buscaTimeout = null;

            function buscarMusica(termo) {
                if (!termo || termo.length < 2) { showNotification('📋 2 caracteres mínimo', 1000); return; }

                const res = musicas.filter(m =>

                if (res.length === 0) { showNotification('🔍 Nenhuma encontrada', 1500); return; }
                const primeira = res[0];
                currentPlaylist = shuffleArray([primeira, ...res.filter(m => m.id !== primeira.id)]);

                ultimoId = primeira.id;
                historicoReproducao = [];
                updateNowPlaying(primeira);
                genreBadge.innerHTML = `🔍 ${res.length} resultados`;

            }

            function nextTrack() {
                if (carregandoMusica) return;
                if (!currentPlaylist || currentPlaylist.length === 0) { currentPlaylist = shuffleArray([...musicas]); currentIndex = 0; }
                if (isPlaying) playMusic();
                else { 
                    const t = obterProximaMusica(); 
                    if (t) { 
                        ultimoId = t.id; 
                        updateNowPlaying(t); 
                        adicionarAoHistorico(t); 
                        const urls = gerarUrlsAlternativas(t);
                        audio.src = urls[0] || t.src; 
                        audio.load(); 
                    } 
                }
                showControls();
            }

            function prevTrack() {
                if (carregandoMusica) return;
                if (!currentPlaylist || currentPlaylist.length === 0) { nextTrack(); return; }
                if (currentIndex <= 0) currentIndex = currentPlaylist.length - 1;
                else { currentIndex -= 2; if (currentIndex < 0) currentIndex = 0; }
                if (currentIndex >= currentPlaylist.length) currentIndex = currentPlaylist.length - 1;
                const t = currentPlaylist[currentIndex];
                if (!t) { nextTrack(); return; }
                ultimoId = t.id;
                updateNowPlaying(t);
                adicionarAoHistorico(t);
                const urls = gerarUrlsAlternativas(t);
                if (isPlaying) { audio.pause(); audio.src = urls[0] || t.src; audio.load(); audio.play().catch(() => {}); }
                else { audio.src = urls[0] || t.src; audio.load(); }
                currentIndex++;

            }

            function toggleShuffle() {
                shuffleMode = !shuffleMode;

            function createSilentAudio() {
                try {
                    const sr = 44100, d = 1, ns = sr * d;
                    const b = new ArrayBuffer(44 + ns * 2);
                    const v = new DataView(b);
                    const w = (v2, o, s) => { for (let i = 0; i < s.length; i++) v2.setUint8(o + i, s.charCodeAt(i)); };
                    w(v, 0, 'RIFF'); v.setUint32(4, 36 + ns * 2, true);
                    w(v, 8, 'WAVE'); w(v, 12, 'fmt ');
                    v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
                    v.setUint32(24, sr, true); v.setUint32(28, sr * 2, true);
                    v.setUint16(32, 2, true); v.setUint16(34, 16, true);
                    w(v, 36, 'data'); v.setUint32(40, ns * 2, true);
                    let o = 44;
                    for (let i = 0; i < ns; i++) { v.setInt16(o, 0, true); o += 2; }
                    return URL.createObjectURL(new Blob([b], { type: 'audio/wav' }));
                } catch(e) { return ''; }
            }

            });

            clearSearchBtn.addEventListener('click', () => {
                searchInput.value = '';
                searchInput.dispatchEvent(new Event('input'));
                clearSearchBtn.style.display = 'none';
                searchInput.focus();
            });

            menuButton.addEventListener('click', (e) => { e.stopPropagation(); menuPopup.classList.toggle('open'); showControls(); });
            document.getElementById('closeMenuBtn').addEventListener('click', () => { menuPopup.classList.remove('open'); });

            document.addEventListener('click', (e) => {
                if (menuPopup.classList.contains('open') && !menuPopup.contains(e.target) && e.target !== menuButton) menuPopup.classList.remove('open');
                showControls();
            });

            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;
                switch(e.key) {
                    case ' ': e.preventDefault(); togglePlay(); break;
                    case 'ArrowRight': nextTrack(); break;
                    case 'ArrowLeft': prevTrack(); break;
                    case 's': case 'S': toggleShuffle(); break;
                    case 'f': case 'F': const m = currentPlaylist[currentIndex % currentPlaylist.length] || currentPlaylist[0]; if (m) { toggleFavorito(m.id); renderFavList(); updateFavCount(); } break;
                }
            });

            tapToStart.addEventListener('click', async () => {
                showNotification('🔊 Ativando áudio...', 1000);
                await ativarAudio();
                tapToStart.style.display = 'none';
                goFullscreen();
            });

            document.getElementById('favModal').addEventListener('click', (e) => { if (e.target === document.getElementById('favModal')) document.getElementById('favModal').classList.remove('open'); });

            let lastTap = 0;
            document.getElementById('nowPlaying').addEventListener('click', (e) => {
                const now = Date.now();
                if (now - lastTap < 300 && now - lastTap > 50) {
                    const m = currentPlaylist[currentIndex % currentPlaylist.length] || currentPlaylist[0];
                    if (m) { toggleFavorito(m.id); renderFavList(); updateFavCount(); showNotification('❤️ Adicionado!', 1000); }
                }
                lastTap = now;
                showControls();
            });

            window.addEventListener('load', iniciar);
        })();
    </script>
</body>
</html>
